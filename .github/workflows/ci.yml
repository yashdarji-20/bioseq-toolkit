name: CI

# Run on every push to main and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Tests and quality checks
    runs-on: ubuntu-latest

    strategy:
      # Don't cancel the other versions when one fails - we want the full picture.
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package and development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Check formatting with black
        # --check reports problems without rewriting files, which is what CI wants.
        run: black --check src tests

      - name: Type-check with mypy
        run: mypy src

      - name: Run tests with coverage
        run: pytest